<section class="visible-md visible-lg about-card-section">
  <hr>

  <h5>
    <a href="{{'/about/' | prepend: site.baseurl }}">ABOUT ME</a>
  </h5>

  <div class="short-about about-card">

    {% if site.sidebar-avatar %}
    <a href="{{'/about/' | prepend: site.baseurl }}" class="about-avatar-link">
      <img class="about-avatar" src="{{site.sidebar-avatar}}" alt="Gihoon Song profile image" />
    </a>
    {% endif %}

    {% if site.sidebar-about-description %}
    <div class="about-info">
      <div class="about-name">Gihoon Song</div>
      <div class="about-name-kr">송기훈</div>

      <div class="about-role">
        Ph.D. Student · Artificial Intelligence
      </div>

      <div class="about-affiliation">
        Hanyang University<br>
        UNICON Lab
      </div>

      <div class="about-keywords">
        <span>AI Control</span>
        <span>LLM</span>
        <span>Robotics</span>
        <span>Autonomous Driving</span>
      </div>
    </div>
    {% endif %}

    <!-- SNS Link -->
    <div class="about-sns">
      {% include sns-links.html %}
    </div>

  </div>
